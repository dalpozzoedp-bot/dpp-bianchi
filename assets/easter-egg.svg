<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg" style="display: none;">
  <defs>
    <style>
      .egg-face { fill: none; stroke: #111111; stroke-width: 1.5; }
      .egg-feature { fill: #111111; }
    </style>
  </defs>

  <!-- Testa -->
  <ellipse cx="50" cy="45" rx="35" ry="40" class="egg-face"/>

  <!-- Occhio sinistro -->
  <ellipse cx="35" cy="40" rx="5" ry="7" class="egg-feature"/>

  <!-- Occhio destro -->
  <ellipse cx="65" cy="40" rx="5" ry="7" class="egg-feature"/>

  <!-- Sopracciglio sinistro -->
  <path d="M 25 32 Q 35 28 45 32" class="egg-face"/>

  <!-- Sopracciglio destro -->
  <path d="M 55 32 Q 65 28 75 32" class="egg-face"/>

  <!-- Naso -->
  <line x1="50" y1="45" x2="50" y2="55" class="egg-face"/>

  <!-- Bocca (sorriso smug) -->
  <path d="M 35 65 Q 50 72 65 65" class="egg-face"/>

  <!-- Dente -->
  <rect x="48" y="65" width="4" height="3" class="egg-feature"/>

  <!-- Orecchio sinistro -->
  <ellipse cx="15" cy="50" rx="6" ry="12" class="egg-face"/>

  <!-- Capelli -->
  <path d="M 20 15 Q 50 5 80 15 Q 85 20 80 25 Q 50 20 20 25" class="egg-face"/>
</svg>
